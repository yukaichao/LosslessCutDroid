name: Build Android APK with FFmpeg

on:
  workflow_dispatch:
    inputs:
      ffmpeg_version:
        description: 'FFmpeg release version from ffmpeg.org/releases'
        required: true
        default: '8.0'
      android_api:
        description: 'Android API level used by NDK clang target'
        required: true
        default: '26'
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build debug APK with FFmpeg arm64-v8a
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    env:
      ANDROID_NDK_VERSION: '27.2.12479018'
      FFMPEG_VERSION: ${{ github.event.inputs.ffmpeg_version || '8.0' }}
      ANDROID_API: ${{ github.event.inputs.android_api || '26' }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK / NDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install FFmpeg build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl \
            xz-utils \
            make \
            pkg-config \
            file \
            ca-certificates

      - name: Cache FFmpeg source/build directory
        uses: actions/cache@v4
        with:
          path: build/ffmpeg-android-arm64
          key: ffmpeg-${{ runner.os }}-${{ env.FFMPEG_VERSION }}-api${{ env.ANDROID_API }}-ndk${{ env.ANDROID_NDK_VERSION }}-${{ hashFiles('scripts/build_ffmpeg_android_arm64.sh') }}
          restore-keys: |
            ffmpeg-${{ runner.os }}-${{ env.FFMPEG_VERSION }}-api${{ env.ANDROID_API }}-ndk${{ env.ANDROID_NDK_VERSION }}-

      - name: Build FFmpeg arm64-v8a binary
        shell: bash
        run: bash scripts/build_ffmpeg_android_arm64.sh

      - name: Verify FFmpeg binary for Gradle packaging
        shell: bash
        run: |
          test -s prebuilt/ffmpeg/arm64-v8a/libffmpeg.so
          ls -lh prebuilt/ffmpeg/arm64-v8a/libffmpeg.so
          file prebuilt/ffmpeg/arm64-v8a/libffmpeg.so || true

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle :app:assembleDebug -PrequireFfmpeg=true --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LosslessCutter-debug-apk-with-ffmpeg
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload FFmpeg binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android-arm64-v8a
          path: |
            prebuilt/ffmpeg/arm64-v8a/libffmpeg.so
            prebuilt/ffmpeg/arm64-v8a/ffmpeg-build-manifest.txt
          if-no-files-found: error
