name: Build Android APK with FFmpeg

on:
  workflow_dispatch:
    inputs:
      ffmpeg_version:
        description: 'FFmpeg release version from ffmpeg.org/releases'
        required: true
        default: '8.0'
      android_api:
        description: 'Android API level used by NDK clang target'
        required: true
        default: '26'
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build APK with FFmpeg arm64-v8a
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    env:
      ANDROID_NDK_VERSION: '27.2.12479018'
      FFMPEG_VERSION: ${{ github.event.inputs.ffmpeg_version || '8.0' }}
      ANDROID_API: ${{ github.event.inputs.android_api || '26' }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK / NDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install FFmpeg build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl \
            git \
            xz-utils \
            make \
            pkg-config \
            file \
            ca-certificates

      - name: Cache FFmpeg source/build directory
        uses: actions/cache@v4
        with:
          path: build/ffmpeg-android-arm64
          key: ffmpeg-${{ runner.os }}-${{ env.FFMPEG_VERSION }}-api${{ env.ANDROID_API }}-ndk${{ env.ANDROID_NDK_VERSION }}-${{ hashFiles('scripts/build_ffmpeg_android_arm64.sh') }}
          restore-keys: |
            ffmpeg-${{ runner.os }}-${{ env.FFMPEG_VERSION }}-api${{ env.ANDROID_API }}-ndk${{ env.ANDROID_NDK_VERSION }}-

      - name: Build FFmpeg arm64-v8a binary
        shell: bash
        run: bash scripts/build_ffmpeg_android_arm64.sh

      - name: Verify FFmpeg binary for Gradle packaging
        shell: bash
        run: |
          test -s prebuilt/ffmpeg/arm64-v8a/libffmpeg.so
          test -s prebuilt/ffmpeg/arm64-v8a/libffprobe.so
          ls -lh prebuilt/ffmpeg/arm64-v8a/libffmpeg.so prebuilt/ffmpeg/arm64-v8a/libffprobe.so
          file prebuilt/ffmpeg/arm64-v8a/libffmpeg.so || true
          file prebuilt/ffmpeg/arm64-v8a/libffprobe.so || true

      - name: Setup Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Prepare stable signing keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/losslesscutdroid-signing"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/losslesscutdroid-signing/release.jks"
          test -s "$RUNNER_TEMP/losslesscutdroid-signing/release.jks"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/losslesscutdroid-signing/release.jks" >> "$GITHUB_ENV"
          echo "RELEASE_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build APK
        shell: bash
        run: |
          if [[ -n "${RELEASE_STORE_FILE:-}" ]]; then
            echo "Stable signing secrets detected. Building signed release APK."
            gradle :app:assembleRelease -PrequireFfmpeg=true --no-daemon --stacktrace
          else
            echo "No signing secrets configured. Building debug APK. Debug certificate may change on clean CI runners."
            gradle :app:assembleDebug -PrequireFfmpeg=true --no-daemon --stacktrace
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LosslessCutDroid-apk-with-ffmpeg
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Upload FFmpeg binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android-arm64-v8a
          path: |
            prebuilt/ffmpeg/arm64-v8a/libffmpeg.so
            prebuilt/ffmpeg/arm64-v8a/libffprobe.so
            prebuilt/ffmpeg/arm64-v8a/ffmpeg-build-manifest.txt
          if-no-files-found: error
